services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    networks:
      - ecommerce-network

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - ecommerce-network

  server:
    build: ./server
    ports:
      - "8000:8000"
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=admin
      - DB_HOST=db
      - DB_NAME=smart_db
      - DB_PORT=5432
      - SECRET_KEY=your-secret-key-change-me
      - GEMINI_API_KEY=your-gemini-api-key
    depends_on:
      - db
    networks:
      - ecommerce-network

  db:
    image: postgres:13
    environment:
      POSTGRES_DB: smart_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network

volumes:
  jenkins_home:
  postgres_data:

networks:
  ecommerce-network:
    driver: bridge