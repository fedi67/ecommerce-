services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - server

  server:
    build: ./server
    ports:
      - "8000:8000"
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=admin
      - DB_HOST=db
      - DB_NAME=smart_db
      - DB_PORT=5432
      - SECRET_KEY=your-secret-key-change-me
      - GEMINI_API_KEY=your-gemini-api-key
    depends_on:
      - db

  db:
    image: postgres:13
    environment:
      POSTGRES_DB: smart_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: