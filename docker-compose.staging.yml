version: '3.8'

services:
  frontend:
    image: your-dockerhub-username/p2m-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - ecommerce-network

  server:
    image: your-dockerhub-username/p2m-server:latest
    ports:
      - "8000:8000"
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=admin
      - DB_HOST=db
      - DB_NAME=smart_db
      - DB_PORT=5432
      - SECRET_KEY=staging-secret-key
      - GEMINI_API_KEY=staging-gemini-key
    depends_on:
      - db
    networks:
      - ecommerce-network

  db:
    image: postgres:13
    environment:
      POSTGRES_DB: smart_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    networks:
      - ecommerce-network

volumes:
  postgres_data_staging:

networks:
  ecommerce-network:
    driver: bridge