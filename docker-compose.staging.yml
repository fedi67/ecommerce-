version: '3.8'

services:
  frontend:
    image: your-dockerhub-username/p2m-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - server

  server:
    image: your-dockerhub-username/p2m-server:latest
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=staging-secret-key
      - GEMINI_API_KEY=staging-gemini-key
      - DATABASE_URL=postgresql://user:password@db:5432/ecommerce_db
    depends_on:
      - db

  db:
    image: postgres:13
    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: